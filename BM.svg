    <circle cx="27" cy="19.5" r="0.8" fill="#ffff8d" stroke="#fbc02d" stroke-width="0.3"/> <circle cx="26" cy="14" r="0.4" fill="#ffb74d"/> <path d="M17.5 13 L18 12.5 H19 L18.5 13.5 Z" fill="#9e9e9e" stroke="#757575" stroke-width="0.2"/>
    <rect x="18" y="21" width="3" height="0.8" rx="0.4" ry="0.4" fill="#bdbdbd"/>

