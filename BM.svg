    <text x="5" y="16" font-family="Arial, sans-serif" font-size="3" fill="#ffffff" opacity="0.8">D</text>

    <path d="M18 12 C18 11, 20 10, 22 10 H24 C26 10, 27 11, 28 12 V16 C28 18, 27 20, 26 21 H18 Z" fill="url(#cabGradient)"/>
    <path d="M19 13 H23 V17 H19 Z" fill="url(#windowGradient)" rx="0.5" ry="0.5"/>
    <rect x="24" y="16" width="1.5" height="0.5" rx="0.25" ry="0.25" fill="#757575"/>
    <rect x="25" y="18" width="2" height="3" rx="0.5" ry="0.5" fill="#9e9e9e"/>
